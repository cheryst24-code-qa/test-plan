name: Validate QA Documentation

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/**'
  push:
    branches: [main, develop, master]
    paths:
      - '**/*.md'

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ ИСПРАВЛЕННЫЙ ШАГ: указываем путь к файлу, а не inline-конфиг
      - name: Lint Markdown (markdownlint)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'

      - name: Check for unfilled placeholders
        run: |
          FILES="TEST_PLAN.md CONTRIBUTING.md TEST_SUMMARY_REPORT.md README.md"
          PATTERN='\[\.\.\.\]|\[\.\.\]|\[ \]'
          
          FOUND=0
          for file in $FILES; do
            if [ -f "$file" ]; then
              MATCHES=$(grep -nE "$PATTERN" "$file" | grep -v '<!-- ignore-placeholder -->' || true)
              if [ -n "$MATCHES" ]; then
                echo "::error file=$file::❌ Found unfilled placeholders in $file:"
                echo "$MATCHES"
                FOUND=1
              fi
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo "::error::Please fill all placeholders [...] or add <!-- ignore-placeholder --> comment."
            exit 1
          else
            echo "✅ All placeholders are filled or ignored."
          fi

      - name: 🔗 Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          check-modified-files-only: 'yes'
          config-file: '.github/link-check-config.json'
        continue-on-error: true

  summary:
    needs: lint-and-validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Job Summary
        run: |
          if [ "${{ needs.lint-and-validate.result }}" == "success" ]; then
            echo "✅ Documentation validation passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Documentation validation failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi